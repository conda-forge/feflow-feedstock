{% set name = "feflow" %}
{% set version = "0.2.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/OpenFreeEnergy/feflow/archive/{{ version }}.tar.gz
  sha256: 8be682a7aef423ecdffffe7a2c674686290923a07dbfe5a4f781d9b1a559ece1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - versioningit >=2.0,<3.dev0
    - pip
  run:
    - python >={{ python_min }}
    - gufe >=1.7,<1.8
    - numpy
    - openfe >=1.8, <1.9  # TODO: Remove once we don't depend on openfe
    - openff-units
    - openmm
    - openmmtools >=0.23.0
    - pydantic >=1.10.17,<3
    - pymbar >4.0

test:
  imports:
    - feflow
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/OpenFreeEnergy/feflow
  summary: Recipes and protocols for molecular free energy calculations using the openmmtools/perses and Open Free Energy toolkits
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - dotsdl
    - ijpulidos
    - IAlibay
    - mikemhenry
